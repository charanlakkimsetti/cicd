name: Deploy to AWS Ubuntu

on:
  push:
    branches:
      - main  # Triggers when code is pushed to main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js (if applicable)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install  # Change for Python: pip install -r requirements.txt

      - name: Build Project (Optional)
        run: npm run build  # Remove if not needed

      - name: Restart Application
        run: |
          pm2 stop all || true
          pm2 start npm -- start


